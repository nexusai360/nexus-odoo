<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nexus Odoo - Agente Nex">
  <defs>
    <!-- Gradiente da marca: violeta (topo-esq.) -> indigo escuro (rodape-dir.), igual ao logo.png -->
    <linearGradient id="brand" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0" stop-color="#6939CF"/>
      <stop offset="1" stop-color="#2D2750"/>
    </linearGradient>
    <!-- Brilho sutil no canto superior esquerdo, profundidade discreta -->
    <radialGradient id="sheen" gradientUnits="userSpaceOnUse" cx="150" cy="130" r="320">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo arredondado (raio ~22% como o logo) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#brand)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#sheen)"/>

  <!-- Antena -->
  <circle cx="256" cy="96" r="23" fill="#FFFFFF"/>
  <rect x="247" y="112" width="18" height="46" rx="9" fill="#FFFFFF"/>

  <!-- Orelhinhas (laterais do bot) -->
  <rect x="100" y="214" width="28" height="86" rx="14" fill="#FFFFFF"/>
  <rect x="384" y="214" width="28" height="86" rx="14" fill="#FFFFFF"/>

  <!-- Cabeca / rosto -->
  <rect x="124" y="150" width="264" height="212" rx="62" fill="#FFFFFF"/>

  <!-- Olhos e sorriso recortados (mostram o gradiente do fundo) -->
  <circle cx="205" cy="244" r="29" fill="url(#brand)"/>
  <circle cx="307" cy="244" r="29" fill="url(#brand)"/>
  <path d="M214 300 Q256 332 298 300" stroke="url(#brand)" stroke-width="18" stroke-linecap="round" fill="none"/>
</svg>
