name: Build and Push

# Push em main -> builda as duas imagens (app e mcp), pusha pro GHCR e
# dispara redeploy dos services no Swarm via Portainer API.
#
# nexus-odoo tem DOIS artefatos de imagem:
#   - ghcr.io/nexusai360/nexus-odoo       (docker/Dockerfile) -> services app e worker
#   - ghcr.io/nexusai360/nexus-odoo-mcp   (mcp/Dockerfile)    -> service mcp
#
# O service db (pgvector) e redis usam imagens publicas, nao sao buildados aqui.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/nexusai360/nexus-odoo
  IMAGE_MCP: ghcr.io/nexusai360/nexus-odoo-mcp

jobs:
  build-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Metadata (app)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_APP }}
          tags: |
            type=sha
            type=raw,value=latest
      # Build/push resiliente: GHCR retorna "unknown blob" de forma transitoria (corrida
      # do manifesto de atestacao/provenance no push). provenance=false remove a causa-raiz
      # e o retry 3x absorve qualquer blip residual. Sem isso, uma falha de push pulava o
      # deploy (deploy depende de build-app+build-mcp) e disparava email de falha.
      - name: Build and push (app, resiliente)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          set -uo pipefail
          TAG_ARGS=""; while IFS= read -r t; do [ -n "$t" ] && TAG_ARGS="$TAG_ARGS --tag $t"; done <<< "$TAGS"
          LABEL_ARGS=""; while IFS= read -r l; do [ -n "$l" ] && LABEL_ARGS="$LABEL_ARGS --label $l"; done <<< "$LABELS"
          for i in 1 2 3; do
            echo "== build/push app tentativa $i/3 =="
            if docker buildx build --push --provenance=false \
                 --file docker/Dockerfile $TAG_ARGS $LABEL_ARGS \
                 --build-arg APP_VERSION=${{ github.sha }} .; then
              echo "OK"; exit 0
            fi
            echo "Falhou (provavel 'unknown blob' transitorio do GHCR); aguardando $((i*20))s..."; sleep $((i*20))
          done
          echo "build/push app falhou apos 3 tentativas"; exit 1

  build-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Metadata (mcp)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_MCP }}
          tags: |
            type=sha
            type=raw,value=latest
      # Mesmo build resiliente do app (provenance=false + retry 3x) , o "unknown blob"
      # apareceu justamente no build-mcp (ver historico de falhas).
      - name: Build and push (mcp, resiliente)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          set -uo pipefail
          TAG_ARGS=""; while IFS= read -r t; do [ -n "$t" ] && TAG_ARGS="$TAG_ARGS --tag $t"; done <<< "$TAGS"
          LABEL_ARGS=""; while IFS= read -r l; do [ -n "$l" ] && LABEL_ARGS="$LABEL_ARGS --label $l"; done <<< "$LABELS"
          for i in 1 2 3; do
            echo "== build/push mcp tentativa $i/3 =="
            if docker buildx build --push --provenance=false \
                 --file mcp/Dockerfile $TAG_ARGS $LABEL_ARGS .; then
              echo "OK"; exit 0
            fi
            echo "Falhou (provavel 'unknown blob' transitorio do GHCR); aguardando $((i*20))s..."; sleep $((i*20))
          done
          echo "build/push mcp falhou apos 3 tentativas"; exit 1

  deploy:
    needs: [build-app, build-mcp]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      packages: read
    env:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
      PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
      PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
      # GITHUB_TOKEN (packages: read) basta para autenticar o pull no GHCR.
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # DIAGNOSTICO DEFINITIVO (2026-06-12, apos 6 falhas-e-reruns em 24h):
      # o HTTP 000 NAO e blip aleatorio. A protecao de borda do provedor da VPS
      # bloqueia IPs de datacenter (runners do GitHub/Azure) em JANELAS de
      # 15-40min: nessas janelas o TCP nem conecta (connect-timeout estoura
      # 3x20s = os 66s exatos vistos em cada curl do log), e minutos depois tudo
      # volta a responder em ms. Da rede do usuario nunca falha. Conclusao:
      # retry em SEGUNDOS nunca atravessa a janela; rerun manual "funciona"
      # porque o humano demora minutos. O fix e o job ESPERAR a janela abrir:
      # rodadas calmas (1 tentativa por chamada) com pausa de 5min entre elas,
      # por ate 60min. Sem storm (max ~12 rodadas/h), sem email vermelho, e o
      # deploy SEMPRE conclui , so que as vezes demora.
      # (Saida definitiva futura: deploy pull-based na VPS , shepherd/watchtower
      # com PAT read:packages do ghcr; registrado no runbook deploy-procedure.md.)
      - name: Trigger Portainer redeploy (Swarm-aware, espera janela de rede)
        run: |
          set -e
          if [ -z "$PORTAINER_STACK_ID" ]; then
            echo "PORTAINER_STACK_ID nao configurado (primeiro deploy ainda nao criou a stack) — pulando."
            exit 0
          fi
          AUTH=$(printf '{"username":"%s","password":"%s"}' "${GITHUB_ACTOR:-jvzanini}" "$GHCR_TOKEN" | base64 | tr -d '\n')
          API="$PORTAINER_URL/api/endpoints/$PORTAINER_ENDPOINT_ID/docker"

          # 1 tentativa por chamada (sem --retry: retry em segundos nao atravessa
          # a janela de bloqueio e so faz barulho). max-time 600 nos pulls porque
          # /images/create mantem a conexao aberta ate o download da imagem acabar.
          CURL=(curl --silent --insecure --connect-timeout 15 --max-time 600)

          tentar_deploy() {
            # Pull das duas imagens (app/worker usam IMAGE_APP; mcp usa IMAGE_MCP).
            for IMG in "$IMAGE_APP" "$IMAGE_MCP"; do
              "${CURL[@]}" -X POST -H "X-API-Key: $PORTAINER_TOKEN" -H "X-Registry-Auth: $AUTH" \
                "$API/images/create?fromImage=$IMG&tag=latest" -o /tmp/pull.log -w "Pull $IMG: HTTP %{http_code}\n" || true
            done

            # VERIFICACAO OBRIGATORIA (2026-06-12): o pull acima ja foi best-effort
            # com janela ruim e o ForceUpdate subiu IMAGEM VELHA com "success" de
            # mentira (deploy fantasma do #105). A imagem :latest local PRECISA ser
            # a deste commit , o metadata-action grava o sha no label revision.
            for IMG in "$IMAGE_APP" "$IMAGE_MCP"; do
              REV=$("${CURL[@]}" -H "X-API-Key: $PORTAINER_TOKEN" "$API/images/$IMG:latest/json" | jq -r '.Config.Labels["org.opencontainers.image.revision"] // empty') || return 1
              if [ "$REV" != "$GITHUB_SHA" ]; then
                echo "Imagem $IMG:latest no host tem revision=$REV != $GITHUB_SHA (pull nao trouxe a imagem nova)"
                return 1
              fi
            done
            echo "Imagens verificadas: revision == $GITHUB_SHA nas duas."

            STACK_NAME=$("${CURL[@]}" -H "X-API-Key: $PORTAINER_TOKEN" "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID" | jq -r '.Name') || return 1
            [ -n "$STACK_NAME" ] && [ "$STACK_NAME" != "null" ] || return 1
            echo "Stack: $STACK_NAME | services alvo: ${STACK_NAME}_app, ${STACK_NAME}_mcp, ${STACK_NAME}_worker"
            "${CURL[@]}" -H "X-API-Key: $PORTAINER_TOKEN" "$API/services" > /tmp/svc.json || return 1

            # Forca redeploy dos 3 services que rodam imagem buildada (ForceUpdate++).
            for SVC in app mcp worker; do
              SERVICE_NAME="${STACK_NAME}_${SVC}"
              SVC_ID=$(jq -r --arg n "$SERVICE_NAME" '[.[] | select(.Spec.Name==$n)][0].ID // empty' /tmp/svc.json)
              if [ -z "$SVC_ID" ]; then
                echo "Service $SERVICE_NAME nao encontrado — pulando:"
                jq -r '[.[].Spec.Name]' /tmp/svc.json
                continue
              fi
              SVC_VER=$(jq -r --arg n "$SERVICE_NAME" '[.[] | select(.Spec.Name==$n)][0].Version.Index' /tmp/svc.json)
              jq --arg n "$SERVICE_NAME" '[.[] | select(.Spec.Name==$n)][0].Spec | .TaskTemplate.ForceUpdate = ((.TaskTemplate.ForceUpdate // 0) + 1)' /tmp/svc.json > /tmp/spec.json
              HTTP=$("${CURL[@]}" -o /tmp/upd.log -w "%{http_code}" -X POST -H "X-API-Key: $PORTAINER_TOKEN" -H "Content-Type: application/json" -H "X-Registry-Auth: $AUTH" "$API/services/$SVC_ID/update?version=$SVC_VER" --data-binary @/tmp/spec.json) || return 1
              echo "Redeploy $SERVICE_NAME (id=$SVC_ID ver=$SVC_VER): HTTP $HTTP"
              if [ "$HTTP" = "000" ]; then return 1; fi
              if [ "$HTTP" != "200" ]; then echo "  update $SERVICE_NAME falhou HTTP $HTTP (erro REAL, nao janela)"; cat /tmp/upd.log; echo ""; return 2; fi
            done
            return 0
          }

          # Ate 12 rodadas com 5min de pausa = espera de ate ~60min pela janela.
          # ForceUpdate++ e idempotente: rodada repetida apos sucesso parcial e inofensiva.
          for RODADA in $(seq 1 12); do
            echo "=== rodada $RODADA/12 ($(date -u +%H:%M:%SZ)) ==="
            set +e; tentar_deploy; RC=$?; set -e
            if [ "$RC" = "0" ]; then echo "Redeploy disparado com sucesso."; exit 0; fi
            if [ "$RC" = "2" ]; then echo "Erro real da API do Portainer — abortando."; exit 1; fi
            if [ "$RODADA" -lt 12 ]; then
              echo "Janela de rede fechada (TCP nao conecta). Aguardando 5min pela proxima janela..."
              sleep 300
            fi
          done
          echo "Janela de rede nao abriu em ~60min — falha de deploy real."
          exit 1
