name: Build and Push

# Push em main -> builda as duas imagens (app e mcp), pusha pro GHCR e
# dispara redeploy dos services no Swarm via Portainer API.
#
# nexus-odoo tem DOIS artefatos de imagem:
#   - ghcr.io/nexusai360/nexus-odoo       (docker/Dockerfile) -> services app e worker
#   - ghcr.io/nexusai360/nexus-odoo-mcp   (mcp/Dockerfile)    -> service mcp
#
# O service db (pgvector) e redis usam imagens publicas, nao sao buildados aqui.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_APP: ghcr.io/nexusai360/nexus-odoo
  IMAGE_MCP: ghcr.io/nexusai360/nexus-odoo-mcp

jobs:
  build-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Metadata (app)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_APP }}
          tags: |
            type=sha
            type=raw,value=latest
      # Build/push resiliente: GHCR retorna "unknown blob" de forma transitoria (corrida
      # do manifesto de atestacao/provenance no push). provenance=false remove a causa-raiz
      # e o retry 3x absorve qualquer blip residual. Sem isso, uma falha de push pulava o
      # deploy (deploy depende de build-app+build-mcp) e disparava email de falha.
      - name: Build and push (app, resiliente)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          set -uo pipefail
          TAG_ARGS=""; while IFS= read -r t; do [ -n "$t" ] && TAG_ARGS="$TAG_ARGS --tag $t"; done <<< "$TAGS"
          LABEL_ARGS=""; while IFS= read -r l; do [ -n "$l" ] && LABEL_ARGS="$LABEL_ARGS --label $l"; done <<< "$LABELS"
          for i in 1 2 3; do
            echo "== build/push app tentativa $i/3 =="
            if docker buildx build --push --provenance=false \
                 --file docker/Dockerfile $TAG_ARGS $LABEL_ARGS \
                 --build-arg APP_VERSION=${{ github.sha }} .; then
              echo "OK"; exit 0
            fi
            echo "Falhou (provavel 'unknown blob' transitorio do GHCR); aguardando $((i*20))s..."; sleep $((i*20))
          done
          echo "build/push app falhou apos 3 tentativas"; exit 1

  build-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Metadata (mcp)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_MCP }}
          tags: |
            type=sha
            type=raw,value=latest
      # Mesmo build resiliente do app (provenance=false + retry 3x) , o "unknown blob"
      # apareceu justamente no build-mcp (ver historico de falhas).
      - name: Build and push (mcp, resiliente)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          set -uo pipefail
          TAG_ARGS=""; while IFS= read -r t; do [ -n "$t" ] && TAG_ARGS="$TAG_ARGS --tag $t"; done <<< "$TAGS"
          LABEL_ARGS=""; while IFS= read -r l; do [ -n "$l" ] && LABEL_ARGS="$LABEL_ARGS --label $l"; done <<< "$LABELS"
          for i in 1 2 3; do
            echo "== build/push mcp tentativa $i/3 =="
            if docker buildx build --push --provenance=false \
                 --file mcp/Dockerfile $TAG_ARGS $LABEL_ARGS .; then
              echo "OK"; exit 0
            fi
            echo "Falhou (provavel 'unknown blob' transitorio do GHCR); aguardando $((i*20))s..."; sleep $((i*20))
          done
          echo "build/push mcp falhou apos 3 tentativas"; exit 1

  deploy:
    needs: [build-app, build-mcp]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      packages: read
    env:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
      PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
      PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
      # GITHUB_TOKEN (packages: read) basta para autenticar o pull no GHCR.
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger Portainer redeploy (Swarm-aware)
        run: |
          set -uo pipefail
          if [ -z "$PORTAINER_STACK_ID" ]; then
            echo "PORTAINER_STACK_ID nao configurado (primeiro deploy ainda nao criou a stack) — pulando."
            exit 0
          fi

          AUTH=$(printf '{"username":"%s","password":"%s"}' "${GITHUB_ACTOR:-jvzanini}" "$GHCR_TOKEN" | base64 | tr -d '\n')
          API="$PORTAINER_URL/api/endpoints/$PORTAINER_ENDPOINT_ID/docker"
          # Curl resiliente: timeouts explicitos + retry de erros de rede/connrefused.
          # Sem isso, uma lentidao transitoria do Portainer dava HTTP 000 / exit 28 e
          # derrubava o deploy (e disparava email de falha) mesmo com as imagens publicadas.
          CURL=(curl --silent --show-error --insecure --connect-timeout 15 --max-time 120 --retry 4 --retry-delay 6 --retry-connrefused)

          deploy_attempt() {
            local STACK_NAME SVC_ID SVC_VER HTTP IMG SVC SERVICE_NAME
            STACK_NAME=$("${CURL[@]}" -H "X-API-Key: $PORTAINER_TOKEN" "$PORTAINER_URL/api/stacks/$PORTAINER_STACK_ID" | jq -r '.Name // empty')
            if [ -z "$STACK_NAME" ]; then echo "  stack name vazio (Portainer inacessivel?)"; return 1; fi
            echo "Stack: $STACK_NAME"

            # Puxa as imagens novas no no Swarm (app/worker usam IMAGE_APP, mcp usa IMAGE_MCP).
            # Pull e best-effort: se falhar, o proprio redeploy puxa a imagem.
            for IMG in "$IMAGE_APP" "$IMAGE_MCP"; do
              "${CURL[@]}" -X POST -H "X-API-Key: $PORTAINER_TOKEN" -H "X-Registry-Auth: $AUTH" \
                "$API/images/create?fromImage=$IMG&tag=latest" -o /tmp/pull.log -w "Pull $IMG: HTTP %{http_code}\n" \
                || echo "  pull $IMG falhou (segue; o redeploy puxa a imagem)"
            done

            if ! "${CURL[@]}" -H "X-API-Key: $PORTAINER_TOKEN" "$API/services" -o /tmp/svc.json; then
              echo "  falha ao listar services"; return 1; fi
            if ! jq -e . /tmp/svc.json >/dev/null 2>&1; then echo "  svc.json invalido/incompleto"; return 1; fi

            # Forca redeploy dos 3 services que rodam imagem buildada.
            for SVC in app mcp worker; do
              SERVICE_NAME="${STACK_NAME}_${SVC}"
              SVC_ID=$(jq -r --arg n "$SERVICE_NAME" '[.[] | select(.Spec.Name==$n)][0].ID // empty' /tmp/svc.json)
              if [ -z "$SVC_ID" ]; then
                echo "Service $SERVICE_NAME nao encontrado — pulando:"
                jq -r '[.[].Spec.Name]' /tmp/svc.json
                continue
              fi
              SVC_VER=$(jq -r --arg n "$SERVICE_NAME" '[.[] | select(.Spec.Name==$n)][0].Version.Index' /tmp/svc.json)
              jq --arg n "$SERVICE_NAME" '[.[] | select(.Spec.Name==$n)][0].Spec | .TaskTemplate.ForceUpdate = ((.TaskTemplate.ForceUpdate // 0) + 1)' /tmp/svc.json > /tmp/spec.json
              HTTP=$("${CURL[@]}" -o /tmp/upd.log -w "%{http_code}" -X POST -H "X-API-Key: $PORTAINER_TOKEN" -H "Content-Type: application/json" -H "X-Registry-Auth: $AUTH" "$API/services/$SVC_ID/update?version=$SVC_VER" --data-binary @/tmp/spec.json)
              echo "Redeploy $SERVICE_NAME (id=$SVC_ID ver=$SVC_VER): HTTP $HTTP"
              if [ "$HTTP" != "200" ]; then echo "  update $SERVICE_NAME falhou HTTP $HTTP"; cat /tmp/upd.log; echo ""; return 1; fi
            done
            echo "Redeploy disparado com sucesso."
            return 0
          }

          # Retry do ciclo inteiro: absorve indisponibilidade do Portainer (auto-cura).
          # As imagens JA estao publicadas no GHCR neste ponto; aqui so disparamos o redeploy.
          # Janela ampla (~30min, backoff limitado a 90s) para sobreviver a quedas longas do
          # painel/Traefik sem disparar email de falha. So falha apos a janela inteira = outage
          # prolongado real (ai sim alguem precisa olhar o servidor).
          MAX=12
          for i in $(seq 1 $MAX); do
            echo "== Tentativa de deploy $i/$MAX =="
            if deploy_attempt; then exit 0; fi
            WAIT=$((i*30)); [ "$WAIT" -gt 90 ] && WAIT=90
            echo "Tentativa $i falhou; aguardando ${WAIT}s antes de retentar..."
            sleep "$WAIT"
          done
          echo "Deploy falhou apos $MAX tentativas (~30min): Portainer inacessivel durante toda a janela. Verificar o servidor/painel."
          exit 1
